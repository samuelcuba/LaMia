<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Mia - Tu Tienda Online</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card-hover:hover { transform: translateY(-5px); transition: 0.3s; }
        #toast { visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 100; left: 50%; bottom: 30px; transform: translateX(-50%); font-size: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Pantalla de Mantenimiento -->
    <div id="pantalla-mantenimiento" class="hidden fixed inset-0 bg-gray-900 text-white z-[100] flex flex-col items-center justify-center p-6 text-center">
        <div class="text-7xl mb-6 animate-bounce">🛠️</div>
        <h1 class="text-4xl font-extrabold text-yellow-500 mb-4">Mantenimiento Programado</h1>
        <p class="text-xl text-gray-300 max-w-md mb-6">Estamos actualizando nuestro inventario para ofrecerte los mejores productos. ¡Volveremos pronto!</p>
        <p class="text-gray-500">La Mia &#x1F1E8;&#x1F1FA;</p>
    </div>

    <!-- Encabezado -->
    <header class="bg-red-600 text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold">&#x1F1E8;&#x1F1FA; La Mia</h1>
            
            <div class="flex items-center gap-3">
                <!-- Interruptor de Moneda -->
                <div class="bg-white text-red-600 font-bold py-1 px-2 rounded-full text-xs flex">
                    <button onclick="cambiarMoneda('CUP')" id="btn-cup" class="px-3 py-1 bg-red-600 text-white rounded-full">CUP</button>
                    <button onclick="cambiarMoneda('USD')" id="btn-usd" class="px-3 py-1 text-red-600">USD</button>
                </div>
                
                <!-- Carrito -->
                <div class="bg-white text-red-600 font-bold py-2 px-4 rounded-full text-sm flex items-center gap-2">
                    <span>🛒 <span id="cart-count">0</span></span>
                    <button onclick="vaciarCarrito()" class="text-red-400 hover:text-red-700 font-bold text-lg leading-none ml-1" title="Vaciar carrito">&times;</button>
                </div>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-r from-red-500 to-yellow-500 text-white py-12 text-center">
        <h2 class="text-4xl font-extrabold mb-2">Todo lo que buscas, en un solo lugar</h2>
        <p class="text-lg">Pagos en efectivo (CUP) &#x1F1E8;&#x1F1FA; | Entrega a domicilio o punto de encuentro</p>
    </section>

    <!-- Buscador y Categorías -->
    <div class="container mx-auto px-4 py-6 flex flex-col sm:flex-row gap-4 items-center justify-center">
        <input type="text" id="input-buscar" placeholder="🔎 Buscar producto por nombre..." class="p-3 rounded-full border-2 border-red-200 focus:border-red-500 outline-none w-full sm:w-1/3 text-center text-gray-700 shadow-sm">
        <div class="flex flex-wrap justify-center gap-3" id="categorias-container"></div>
    </div>

    <main class="container mx-auto px-4 py-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6" id="productos-container"></main>

    <!-- Botón Flotante de WhatsApp -->
    <a href="#" id="whatsapp-btn" onclick="return finalizarPedido(event)" class="fixed bottom-6 right-6 bg-green-500 text-white p-4 rounded-full shadow-lg hover:bg-green-600 z-50 flex items-center">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" viewBox="0 0 16 16">
            <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.493.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.929 4.664c-.004 3.626-2.962 6.584-6.59 6.584zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.629.775-.114.133-.232.148-.43.05-.197-.099-.836-.308-1.592-.985-.59-.523-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.132.065-.246.033-.346-.033-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.837.328 1.122.421.473.151.904.129 1.246.08.38-.058 1.171-.479 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/>
        </svg>
    </a>

    <div id="toast">Producto agregado al carrito 🛒</div>

    <script>
        // --- CONFIGURACIÓN SUPABASE ---
        const SUPABASE_URL = 'https://xwaodoprvfzzszohyrlh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh3YW9kb3BydmZ6enN6b2h5cmxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxOTkwMDIsImV4cCI6MjA5ODc3NTAwMn0.2kZkJzLhNh-ANkf4QHFFjMauXONEBZqjOFhSshg_eiA';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let inventario = [];
        let carrito = [];
        let categoriaActual = "Todos";
        let monedaActual = "CUP";
        let textoBusqueda = ""; 
        const TASA_USD = 660; 
        let timeoutBusqueda = null; // Variable para el retraso de la búsqueda

        function cambiarMoneda(moneda) {
            monedaActual = moneda;
            
            if(moneda === 'CUP') {
                document.getElementById('btn-cup').classList.add('bg-red-600', 'text-white', 'rounded-full');
                document.getElementById('btn-cup').classList.remove('text-red-600');
                document.getElementById('btn-usd').classList.remove('bg-red-600', 'text-white', 'rounded-full');
                document.getElementById('btn-usd').classList.add('text-red-600');
            } else {
                document.getElementById('btn-usd').classList.add('bg-red-600', 'text-white', 'rounded-full');
                document.getElementById('btn-usd').classList.remove('text-red-600');
                document.getElementById('btn-cup').classList.remove('bg-red-600', 'text-white', 'rounded-full');
                document.getElementById('btn-cup').classList.add('text-red-600');
            }

            renderizarProductos();
            actualizarUI();
        }

        function formatearPrecio(precioCUP) {
            if (monedaActual === 'USD') {
                return `$${Math.ceil(precioCUP / TASA_USD)} USD`; 
            }
            return `${precioCUP} CUP`;
        }

        // --- CARGAR DESDE SUPABASE ---
        async function cargarInventario() {
            try {
                const { data, error } = await supabaseClient.from('productos').select('*');
                if (error) throw error;
                inventario = data;

                const carritoGuardado = localStorage.getItem('carritoLaMia');
                if (carritoGuardado) {
                    carrito = JSON.parse(carritoGuardado);
                }
                
                renderizarCategorias();
                renderizarProductos();
                actualizarUI();
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('productos-container').innerHTML = "<p class='text-center text-red-600 col-span-full'>Error al conectar con la base de datos.</p>";
            }
        }

        function renderizarCategorias() {
            const categorias = ["Todos", ...new Set(inventario.map(p => p.categoria))];
            const catContainer = document.getElementById('categorias-container');
            catContainer.innerHTML = '';
            categorias.forEach(cat => {
                catContainer.innerHTML += `
                    <button onclick="filtrarCategoria('${cat}')" class="px-4 py-2 rounded-full font-semibold transition ${cat === categoriaActual ? 'bg-red-600 text-white' : 'bg-white text-red-600 border border-red-600 hover:bg-red-100'}">
                        ${cat}
                    </button>
                `;
            });
        }

        function filtrarCategoria(cat) {
            categoriaActual = cat;
            renderizarCategorias();
            renderizarProductos();
        }

        // --- RENDERIZAR PRODUCTOS OPTIMIZADO ---
        function renderizarProductos() {
            const container = document.getElementById('productos-container');
            
            // 1. Filtrar primero por categoría
            let productosAMostrar = categoriaActual === "Todos" ? inventario : inventario.filter(p => p.categoria === categoriaActual);
            
            // 2. Luego filtrar por texto de búsqueda
            if (textoBusqueda.trim() !== "") {
                productosAMostrar = productosAMostrar.filter(p => p.nombre.toLowerCase().includes(textoBusqueda.toLowerCase()));
            }

            // 3. Si no hay resultados
            if(productosAMostrar.length === 0) {
                container.innerHTML = "<p class='text-center text-gray-500 col-span-full text-xl font-semibold mt-10'>No se encontraron productos... 🤔</p>";
                return;
            }

            // 4. Construir todo el HTML en memoria (esto es lo que hace que vuele)
            let htmlAcumulado = '';
            productosAMostrar.forEach(producto => {
                const stock = producto.existencia !== undefined ? producto.existencia : 99;
                const sinStock = stock <= 0;

                htmlAcumulado += `
                    <div class="bg-white rounded-xl shadow-md overflow-hidden card-hover ${sinStock ? 'opacity-50' : ''}">
                        <img src="${producto.img}" alt="${producto.nombre}" loading="lazy" class="w-full h-40 object-cover">
                        <div class="p-4">
                            <span class="text-xs bg-gray-200 text-gray-700 px-2 py-1 rounded-full">${producto.categoria}</span>
                            <h3 class="font-bold text-lg mt-2">${producto.nombre}</h3>
                            <p class="text-sm text-gray-500 mb-1">Disponibles: ${sinStock ? '0' : stock}</p>
                            <p class="text-2xl font-extrabold text-red-600 my-2">${formatearPrecio(producto.venta)}</p>
                            <button onclick="agregarCarrito(${producto.id})" ${sinStock ? 'disabled' : ''} class="w-full font-bold py-2 rounded-lg transition ${sinStock ? 'bg-gray-400 text-gray-700 cursor-not-allowed' : 'bg-red-600 text-white hover:bg-red-700'}">
                                ${sinStock ? 'Agotado' : 'Agregar al Carrito'}
                            </button>
                        </div>
                    </div>
                `;
            });

            // 5. Inyectar todo el HTML de golpe en el DOM
            container.innerHTML = htmlAcumulado;
        }

        // --- EVENTO DE BÚSQUEDA CON RETRASO (DEBOUNCE) ---
        document.getElementById('input-buscar').addEventListener('input', function(e) {
            clearTimeout(timeoutBusqueda);
            // Esperamos 250ms a que el usuario deje de escribir para buscar
            timeoutBusqueda = setTimeout(() => {
                textoBusqueda = e.target.value;
                renderizarProductos();
            }, 250);
        });

        async function agregarCarrito(id) {
            const producto = inventario.find(p => p.id === id);
            if (producto.existencia <= 0) {
                mostrarToast('Producto agotado ❌');
                return;
            }

            const { error } = await supabaseClient.rpc('decrement_stock', { p_id: id, p_qty: 1 });
            if (error) {
                mostrarToast('Error al actualizar stock');
                return;
            }

            producto.existencia -= 1;

            const existe = carrito.find(item => item.id === id);
            if (existe) {
                existe.cantidad += 1;
            } else {
                carrito.push({ id: producto.id, nombre: producto.nombre, venta: producto.venta, cantidad: 1 });
            }

            actualizarUI();
            renderizarProductos();
            mostrarToast(`${producto.nombre} agregado!`);
        }

        async function vaciarCarrito() {
            if (carrito.length === 0) return;
            
            for (const item of carrito) {
                await supabaseClient.rpc('increment_stock', { p_id: item.id, p_qty: item.cantidad });
                const prod = inventario.find(p => p.id === item.id);
                if (prod) prod.existencia += item.cantidad;
            }

            carrito = [];
            localStorage.removeItem('carritoLaMia');
            actualizarUI();
            renderizarProductos();
            mostrarToast('Carrito vaciado, stock restaurado 🗑️');
        }

        async function finalizarPedido(e) {
            if (e) e.preventDefault();

            if (carrito.length === 0) {
                mostrarToast('Tu carrito está vacío');
                return false;
            }
            
            const linkWhatsApp = document.getElementById('whatsapp-btn').href;

            try {
                const ventasData = carrito.map(item => {
                    const prod = inventario.find(p => p.id === item.id);
                    const costoUnitario = prod ? (prod.costo || 0) : 0;
                    const totalVenta = item.venta * item.cantidad;
                    const ganancia = totalVenta - (costoUnitario * item.cantidad);

                    return {
                        producto: item.nombre,
                        cantidad: item.cantidad,
                        precio_venta: item.venta,
                        costo: costoUnitario,
                        total_venta: totalVenta,
                        ganancia: ganancia,
                        moneda: monedaActual
                    };
                });

                const { error } = await supabaseClient.from('ventas').insert(ventasData);
                
                if (error) {
                    console.error("Error de Supabase:", error);
                    alert("❌ No se pudo guardar la venta. Error: " + error.message);
                    return false; 
                }
            } catch(err) {
                console.error("Error en el sistema:", err);
                alert("❌ Error inesperado al guardar: " + err.message);
                return false;
            }

            carrito = [];
            localStorage.removeItem('carritoLaMia');
            actualizarUI();
            mostrarToast('¡Pedido enviado! Gracias 🎉');
            
            window.open(linkWhatsApp, '_blank');
            return false;
        }

        function actualizarUI() {
            const totalItems = carrito.reduce((acc, item) => acc + item.cantidad, 0);
            document.getElementById('cart-count').innerText = totalItems;
            localStorage.setItem('carritoLaMia', JSON.stringify(carrito));

            let telefono = "5352164100"; 
            let btnWhatsApp = document.getElementById('whatsapp-btn');

            if (carrito.length === 0) { btnWhatsApp.href = "#"; return; }

            let mensaje = "¡Hola! 🛒 Quiero hacer el siguiente pedido en La Mia:%0A%0A";
            let totalCUP = 0;
            
            carrito.forEach((item) => {
                const subtotalCUP = item.venta * item.cantidad;
                totalCUP += subtotalCUP;
                
                const subtotalTexto = monedaActual === 'USD' ? `$${Math.ceil(subtotalCUP / TASA_USD)} USD` : `${subtotalCUP} CUP`;
                mensaje += `*${item.cantidad}x* ${item.nombre} - ${subtotalTexto}%0A`;
            });
            
            const totalTexto = monedaActual === 'USD' ? `$${Math.ceil(totalCUP / TASA_USD)} USD` : `${totalCUP} CUP`;
            mensaje += `%0A*Total a pagar en efectivo:* ${totalTexto}%0A%0A¿Coordinamos la entrega? 🚚`;
            btnWhatsApp.href = `https://wa.me/${telefono}?text=${mensaje}`;
        }

        function mostrarToast(mensaje) {
            const toast = document.getElementById("toast");
            toast.innerText = mensaje;
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        // --- INICIALIZACIÓN: REVISAR MANTENIMIENTO ---
        window.onload = async function() {
            try {
                const { data, error } = await supabaseClient.from('ajustes').select('mantenimiento').eq('id', 1).single();
                
                if (data && data.mantenimiento === true) {
                    document.getElementById('pantalla-mantenimiento').classList.remove('hidden');
                } else {
                    cargarInventario();
                }
            } catch (error) {
                cargarInventario();
            }
        };
    </script>
</body>
</html>
