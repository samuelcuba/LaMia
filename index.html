<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Baul Cubano - Tu Tienda Online</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card-hover:hover { transform: translateY(-5px); transition: 0.3s; }
        
        /* Estilos para el mensaje flotante (Toast) */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 100;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-size: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Encabezado -->
    <header class="bg-red-600 text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold">đź‡¨đź‡ş Tienda la Mia</h1>
            <div class="bg-white text-red-600 font-bold py-2 px-4 rounded-full text-sm flex items-center gap-2">
                <span>?? Carrito: <span id="cart-count">0</span></span>
                <button onclick="vaciarCarrito()" class="text-red-400 hover:text-red-700 font-bold text-lg leading-none ml-1" title="Vaciar carrito">&times;</button>
            </div>
        </div>
    </header>

    <!-- Hero -->
    <section class="bg-gradient-to-r from-red-500 to-yellow-500 text-white py-12 text-center">
        <h2 class="text-4xl font-extrabold mb-2">Todo lo que buscas, en un solo lugar</h2>
        <p class="text-lg">Pagos en efectivo (CUP) | Entrega a domicilio o punto de encuentro</p>
    </section>

    <!-- Filtros de Categorías -->
    <div class="container mx-auto px-4 py-6 flex flex-wrap justify-center gap-3" id="categorias-container">
        <!-- Las categorías se cargan aquí -->
    </div>

    <!-- Productos -->
    <main class="container mx-auto px-4 py-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6" id="productos-container">
        <!-- Los productos se cargan aquí -->
    </main>

    <!-- Botón Flotante de WhatsApp -->
    <a href="#" id="whatsapp-btn" onclick="return finalizarPedido()" class="fixed bottom-6 right-6 bg-green-500 text-white p-4 rounded-full shadow-lg hover:bg-green-600 z-50 flex items-center">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" viewBox="0 0 16 16">
            <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.493.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.929 4.664c-.004 3.626-2.962 6.584-6.59 6.584zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.629.775-.114.133-.232.148-.43.05-.197-.099-.836-.308-1.592-.985-.59-.523-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.132.065-.246.033-.346-.033-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.837.328 1.122.421.473.151.904.129 1.246.08.38-.058 1.171-.479 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/>
        </svg>
    </a>

    <!-- Mensaje Flotante (Toast) -->
    <div id="toast">Producto agregado al carrito </div>

    <script>
        let inventario = [];
        let carrito = [];
        let categoriaActual = "Todos";

        // --- CARGAR PRODUCTOS DESDE EL ARCHIVO JSON ---
        async function cargarInventario() {
            try {
                const response = await fetch('productos.json');
                if (!response.ok) throw new Error("No se pudo cargar el inventario");
                inventario = await response.json();
                
                // Si hay un carrito guardado, restar esas cantidades del stock inicial
                const carritoGuardado = localStorage.getItem('carritoElBaul');
                if (carritoGuardado) {
                    carrito = JSON.parse(carritoGuardado);
                    carrito.forEach(itemCarrito => {
                        const prod = inventario.find(p => p.id === itemCarrito.id);
                        if (prod && prod.existencia !== undefined) {
                            prod.existencia -= itemCarrito.cantidad;
                        }
                    });
                }
                
                renderizarCategorias();
                renderizarProductos();
                actualizarUI();
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('productos-container').innerHTML = "<p class='text-center text-red-600 col-span-full'>Error al cargar los productos. Asegúrate de que productos.json existe.</p>";
            }
        }

        // --- 1. SISTEMA DE CATEGORÍAS ---
        function renderizarCategorias() {
            const categorias = ["Todos", ...new Set(inventario.map(p => p.categoria))];
            const catContainer = document.getElementById('categorias-container');
            catContainer.innerHTML = '';
            
            categorias.forEach(cat => {
                catContainer.innerHTML += `
                    <button onclick="filtrarCategoria('${cat}')" class="px-4 py-2 rounded-full font-semibold transition ${cat === categoriaActual ? 'bg-red-600 text-white' : 'bg-white text-red-600 border border-red-600 hover:bg-red-100'}">
                        ${cat}
                    </button>
                `;
            });
        }

        function filtrarCategoria(cat) {
            categoriaActual = cat;
            renderizarCategorias();
            renderizarProductos();
        }

        // --- 2. RENDERIZADO DE PRODUCTOS ---
        function renderizarProductos() {
            const container = document.getElementById('productos-container');
            container.innerHTML = '';
            const productosAMostrar = categoriaActual === "Todos" ? inventario : inventario.filter(p => p.categoria === categoriaActual);

            if(productosAMostrar.length === 0) {
                container.innerHTML = "<p class='text-center col-span-full text-gray-500'>No hay productos en esta categorĂ­a.</p>";
                return;
            }

            productosAMostrar.forEach(producto => {
                // Si el producto no tiene el campo existencia, asumimos que hay stock ilimitado (99)
                const stock = producto.existencia !== undefined ? producto.existencia : 99;
                const sinStock = stock <= 0;

                container.innerHTML += `
                    <div class="bg-white rounded-xl shadow-md overflow-hidden card-hover ${sinStock ? 'opacity-50' : ''}">
                        <img src="${producto.img}" alt="${producto.nombre}" class="w-full h-40 object-cover">
                        <div class="p-4">
                            <span class="text-xs bg-gray-200 text-gray-700 px-2 py-1 rounded-full">${producto.categoria}</span>
                            <h3 class="font-bold text-lg mt-2">${producto.nombre}</h3>
                            <p class="text-sm text-gray-500 mb-1">Disponibles: ${sinStock ? '0' : stock}</p>
                            <p class="text-2xl font-extrabold text-red-600 my-2">${producto.venta} CUP</p>
                            <button onclick="agregarCarrito(${producto.id})" ${sinStock ? 'disabled' : ''} class="w-full font-bold py-2 rounded-lg transition ${sinStock ? 'bg-gray-400 text-gray-700 cursor-not-allowed' : 'bg-red-600 text-white hover:bg-red-700'}">
                                ${sinStock ? 'Agotado' : 'Agregar al Carrito'}
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        // --- 3. LÓGICA DEL CARRITO Y STOCK ---
        function agregarCarrito(id) {
            const producto = inventario.find(p => p.id === id);
            
            // Verificar si hay stock disponible
            if (producto.existencia !== undefined && producto.existencia <= 0) {
                mostrarToast('Producto agotado ?');
                return;
            }

            const existe = carrito.find(item => item.id === id);
            if (existe) {
                existe.cantidad += 1;
            } else {
                // Guardamos solo los datos necesarios en el carrito
                carrito.push({ id: producto.id, nombre: producto.nombre, venta: producto.venta, cantidad: 1 });
            }

            // Restar 1 del stock
            if (producto.existencia !== undefined) {
                producto.existencia -= 1;
            }

            actualizarUI();
            renderizarProductos(); // Volver a dibujar para actualizar el botón si llegó a 0
            mostrarToast(`${producto.nombre} agregado!`);
        }

        function vaciarCarrito() {
            if (carrito.length === 0) return;
            
            // Restaurar el stock de todos los productos en el carrito
            carrito.forEach(itemCarrito => {
                const prod = inventario.find(p => p.id === itemCarrito.id);
                if (prod && prod.existencia !== undefined) {
                    prod.existencia += itemCarrito.cantidad;
                }
            });

            carrito = [];
            localStorage.removeItem('carritoElBaul');
            actualizarUI();
            renderizarProductos(); // Volver a dibujar para activar los botones de Agotado
            mostrarToast('Carrito vaciado, stock restaurado ???');
        }
		
		        // --- FINALIZAR PEDIDO Y LIMPIAR ---
        function finalizarPedido() {
            if (carrito.length === 0) {
                mostrarToast('Tu carrito está vacío');
                return false; // Evita que el enlace haga algo si no hay productos
            }
            
            // 1. Guardamos el enlace de WhatsApp que se generó
            const linkWhatsApp = document.getElementById('whatsapp-btn').href;
            
            // 2. Limpiamos el carrito y la memoria del navegador
            carrito = [];
            localStorage.removeItem('carritoElBaul');
            
            // 3. Actualizamos la pantalla (contador a 0)
            actualizarUI();
            
            // 4. Mostramos mensaje de éxito
            mostrarToast('ˇPedido enviado! Gracias ??');
            
            // 5. Abrimos WhatsApp en una pestańa nueva
            window.open(linkWhatsApp, '_blank');
            
            return false; // Evita que el <a> cambie la página actual
        }

        function actualizarUI() {
            // Actualizar contador
            const totalItems = carrito.reduce((acc, item) => acc + item.cantidad, 0);
            document.getElementById('cart-count').innerText = totalItems;

            // Guardar en localStorage
            localStorage.setItem('carritoElBaul', JSON.stringify(carrito));

            // Actualizar link de WhatsApp
            let telefono = "5352164100"; // TU NÚMERO DE WHATSAPP AQUÍ
            let btnWhatsApp = document.getElementById('whatsapp-btn');

            if (carrito.length === 0) {
                btnWhatsApp.href = "#";
                return;
            }

            let mensaje = "Hola! Quiero hacer el siguiente pedido en La tienda La Mia:%0A%0A";
            let total = 0;
            
            carrito.forEach((item) => {
                const subtotal = item.venta * item.cantidad;
                mensaje += `*${item.cantidad}x* ${item.nombre} - ${subtotal} CUP%0A`;
                total += subtotal;
            });
            
            mensaje += `%0A*Total a pagar en efectivo:* ${total} CUP%0A%0AżCoordinamos la entrega? `;
            btnWhatsApp.href = `https://wa.me/${telefono}?text=${mensaje}`;
        }

        // --- MENSAJE FLOTANTE ---
        function mostrarToast(mensaje) {
            const toast = document.getElementById("toast");
            toast.innerText = mensaje;
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        // --- INICIALIZACIÓN AL CARGAR LA PÁGINA ---
        window.onload = cargarInventario;
    </script>
</body>
</html>
